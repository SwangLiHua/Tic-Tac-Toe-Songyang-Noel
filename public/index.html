<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tic Tac Toe Deluxe</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="menu" class="card">
      <h1>Tic Tac Toe</h1>
      <p class="subtitle">Choose your game mode</p>

      <button id="localBtn">Local Player vs Player</button>
      <button id="consoleBtn">Console Style UI</button>
      <button id="onlineBtn">Create Online Room</button>

      <div class="join-box">
        <input id="roomInput" placeholder="Room Code" maxlength="5" />
        <button id="joinBtn">Join Room</button>
      </div>
    </section>

    <section id="game" class="card hidden">
      <h1>Tic Tac Toe</h1>

      <p id="roomText">Room: Local</p>
      <p id="playerText">Two players on one device</p>
      <p id="statusText">Player X's turn</p>
      <p id="scoreText">X: 0 | O: 0</p>

      <div class="leaderboard">
        <h2>Leaderboard</h2>
        <ol id="leaderboardList">
          <li>No scores yet</li>
        </ol>
      </div>

      <div id="consoleBoard" class="console-board hidden"></div>

      <div id="board" class="board">
        <button class="cell" data-row="0" data-col="0"></button>
        <button class="cell" data-row="0" data-col="1"></button>
        <button class="cell" data-row="0" data-col="2"></button>

        <button class="cell" data-row="1" data-col="0"></button>
        <button class="cell" data-row="1" data-col="1"></button>
        <button class="cell" data-row="1" data-col="2"></button>

        <button class="cell" data-row="2" data-col="0"></button>
        <button class="cell" data-row="2" data-col="1"></button>
        <button class="cell" data-row="2" data-col="2"></button>
      </div>

      <div class="controls">
        <button id="newRoundBtn">New Round</button>
        <button id="menuBtn">Back to Menu</button>
      </div>
    </section>
  </main>

  <div id="winScreen" class="win-screen hidden">
    <div class="win-box">
      <h2 id="winTitle">Player X Wins!</h2>
      <p id="winMessage">Great game.</p>

      <button id="playAgainBtn">Play Again</button>
      <button id="winMenuBtn">Back to Menu</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
